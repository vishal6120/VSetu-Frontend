name: Build VSetu 3 APKs

on:
  push:
    branches:
      - main  # Jab aap code main branch par push karenge tab chalega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        run: |
          npm install
          npm run build

      - name: Set up JDK 17 (Java)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      # ---------------------------------------------
      # 1. CUSTOMER APK BUILD
      # ---------------------------------------------
      - name: Build Customer APK
        run: |
          npx cap sync
          cd android && ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../VSetu_Customer.apk
          cd ..

      # ---------------------------------------------
      # 2. MANAGER APK BUILD (Smart Name Change)
      # ---------------------------------------------
      - name: Build Manager APK
        run: |
          # Android App ka naam aur package id temporarily badlo
          sed -i 's/"appName": "VSetu"/"appName": "VSetu Manager"/g' capacitor.config.json
          sed -i 's/"appId": "com.vsetu.app"/"appId": "com.vsetu.manager"/g' capacitor.config.json
          npx cap sync
          cd android && ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../VSetu_Manager.apk
          cd ..

      # ---------------------------------------------
      # 3. TECHNICIAN APK BUILD (Smart Name Change)
      # ---------------------------------------------
      - name: Build Technician APK
        run: |
          # Dobara badlo Technician ke liye
          sed -i 's/"appName": "VSetu Manager"/"appName": "VSetu Partner"/g' capacitor.config.json
          sed -i 's/"appId": "com.vsetu.manager"/"appId": "com.vsetu.partner"/g' capacitor.config.json
          npx cap sync
          cd android && ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../VSetu_Technician.apk
          cd ..

      # ---------------------------------------------
      # 4. DOWNLOAD LINKS GENERATE KARNA
      # ---------------------------------------------
      - name: Upload All 3 APKs
        uses: actions/upload-artifact@v3
        with:
          name: VSetu-Total-APKs
          path: |
            VSetu_Customer.apk
            VSetu_Manager.apk
            VSetu_Technician.apk