name: Build VSetu 2 APKs (Customer & Technician)

on:
  push:
    branches: [ "main" ] # Agar aapki branch ka naam 'master' hai toh isko master kar lein

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22' # Aapke screenshot ke hisaab se Node 22

      - name: Setup Java (Android ke liye zaroori)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies & Build Web
        run: |
          npm install
          npm run build

      # ----------------------------------------------------
      # 🛠️ 1. CUSTOMER APK BANANE KA PROCESS
      # ----------------------------------------------------
      - name: Sync Capacitor (Customer)
        run: npx cap sync android

      - name: Build Customer APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Save Customer APK file
        run: mv android/app/build/outputs/apk/debug/app-debug.apk VSetu_Customer.apk

      # ----------------------------------------------------
      # 🪄 2. MAGIC SHURU: GITHUB KHUD ID BADLEGA
      # ----------------------------------------------------
      - name: Change IDs to Technician (Auto Magic)
        run: |
          # 1. Config file mein ID badlo
          sed -i 's/"appId": "com.vsetu.app"/"appId": "com.vsetu.technician"/g' capacitor.config.json
          sed -i 's/"appName": "VSetu"/"appName": "VSetu Technician"/g' capacitor.config.json
          
          # 2. Android ke engine (build.gradle) mein ID badlo
          sed -i 's/applicationId "com.vsetu.app"/applicationId "com.vsetu.technician"/g' android/app/build.gradle
          
          # 3. Android ke phone par dikhne wala naam badlo
          sed -i 's/>VSetu</>VSetu Technician</g' android/app/src/main/res/values/strings.xml

      # ----------------------------------------------------
      # 🛠️ 3. TECHNICIAN APK BANANE KA PROCESS
      # ----------------------------------------------------
      - name: Sync Capacitor (Technician)
        run: npx cap copy android

      - name: Build Technician APK
        working-directory: ./android
        run: |
          ./gradlew clean  # Purana kachra saaf karo
          ./gradlew assembleDebug

      - name: Save Technician APK file
        run: mv android/app/build/outputs/apk/debug/app-debug.apk VSetu_Technician.apk

      # ----------------------------------------------------
      # 📥 4. DONO APKS KO DOWNLOAD KE LIYE UPLOAD KARO
      # ----------------------------------------------------
      - name: Upload Both APKs
        uses: actions/upload-artifact@v4
        with:
          name: VSetu-Live-APKs
          path: |
            VSetu_Customer.apk
            VSetu_Technician.apk