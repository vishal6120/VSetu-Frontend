name: Build VSetu 2 APKs (Customer & Technician)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Setup Java (Android ke liye zaroori)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies & Build Web
        run: |
          npm install
          npm run build

      - name: Decode Keystore (Chaabi wapas banana)
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 --decode > android/app/vsetu-release.jks

      # ----------------------------------------------------
      # 🛠️ 1. CUSTOMER APK & PLAY STORE AAB BANANA
      # ----------------------------------------------------
      - name: Sync Capacitor (Customer)
        run: npx cap sync android

      - name: Build Customer APK & AAB
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      - name: Sign the AAB (Digital Lock lagana)
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore android/app/vsetu-release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          android/app/build/outputs/bundle/release/app-release.aab \
          "${{ secrets.KEY_ALIAS }}"

      - name: Save Customer APK aur AAB file (Kachre se bachana)
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk VSetu_Customer.apk
          mv android/app/build/outputs/bundle/release/app-release.aab VSetu_PlayStore_Signed.aab

      # ----------------------------------------------------
      # 🪄 2. MAGIC SHURU: GITHUB KHUD ID BADLEGA
      # ----------------------------------------------------
      - name: Change IDs to Technician (Auto Magic)
        run: |
          sed -i 's/"appId": "com.vsetu.app"/"appId": "com.vsetu.technician"/g' capacitor.config.json
          sed -i 's/"appName": "VSetu"/"appName": "VSetu Technician"/g' capacitor.config.json
          sed -i 's/applicationId "com.vsetu.app"/applicationId "com.vsetu.technician"/g' android/app/build.gradle
          sed -i 's/>VSetu</>VSetu Technician</g' android/app/src/main/res/values/strings.xml

      # ----------------------------------------------------
      # 🛠️ 3. TECHNICIAN APK BANANE KA PROCESS
      # ----------------------------------------------------
      - name: Sync Capacitor (Technician)
        run: npx cap copy android

      - name: Build Technician APK
        working-directory: ./android
        run: |
          ./gradlew clean  
          ./gradlew assembleDebug

      - name: Save Technician APK file
        run: mv android/app/build/outputs/apk/debug/app-debug.apk VSetu_Technician.apk

      # ----------------------------------------------------
      # 📥 4. SAARI FILES UPLOAD KARO
      # ----------------------------------------------------
      - name: Upload Both APKs
        uses: actions/upload-artifact@v4
        with:
          name: VSetu-Live-APKs
          path: |
            VSetu_Customer.apk
            VSetu_Technician.apk
          
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: VSetu-PlayStore-Signed-AAB
          path: VSetu_PlayStore_Signed.aab